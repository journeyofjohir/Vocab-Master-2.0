<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>VocabMaster - Login</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface": "#1a1c1c",
                        "background": "#f9f9f9",
                        "surface-bright": "#f9f9f9",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "inverse-primary": "#b0c6ff",
                        "inverse-on-surface": "#f1f1f1",
                        "tertiary-container": "#882f01",
                        "on-primary-fixed": "#001944",
                        "on-error-container": "#93000a",
                        "primary-fixed-dim": "#b0c6ff",
                        "on-primary-fixed-variant": "#00429a",
                        "secondary-container": "#c4d4ff",
                        "surface-tint": "#265ab8",
                        "on-secondary-fixed-variant": "#37466a",
                        "outline-variant": "#c3c6d4",
                        "surface-container-highest": "#e2e2e2",
                        "on-tertiary-fixed": "#370e00",
                        "surface-container-low": "#f3f3f3",
                        "on-tertiary": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "inverse-surface": "#2f3131",
                        "on-background": "#1a1c1c",
                        "secondary-fixed-dim": "#b6c6f1",
                        "error-container": "#ffdad6",
                        "surface-variant": "#e2e2e2",
                        "on-primary-container": "#a1bcff",
                        "secondary-fixed": "#d9e2ff",
                        "primary-fixed": "#d9e2ff",
                        "tertiary-fixed-dim": "#ffb599",
                        "secondary": "#4e5e83",
                        "surface-container-high": "#e8e8e8",
                        "tertiary-fixed": "#ffdbce",
                        "surface-container": "#eeeeee",
                        "on-secondary": "#ffffff",
                        "outline": "#737784",
                        "on-secondary-container": "#4c5b80",
                        "on-surface-variant": "#434652",
                        "on-tertiary-fixed-variant": "#7f2b00",
                        "on-secondary-fixed": "#081a3c",
                        "surface-dim": "#dadada",
                        "surface": "#f9f9f9",
                        "on-tertiary-container": "#ffa886",
                        "primary": "#003278",
                        "primary-container": "#0047a5",
                        "tertiary": "#631f00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
    
    <style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #f9f9f9;
            min-height: max(884px, 100dvh);
            overflow-x: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .luminous-cta {
            background: linear-gradient(135deg, #003278 0%, #0047a5 100%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface flex flex-col items-center justify-between selection:bg-secondary-container selection:text-on-secondary-container antialiased">
    <!-- Top Navigation -->
    <header class="w-full flex justify-center pt-24 pb-12">
        <div class="flex flex-col items-center space-y-4">
            <h1 class="text-3xl font-extrabold tracking-tighter text-primary">VocabMaster</h1>
        </div>
    </header>

    <main class="w-full max-w-[420px] px-6 flex-grow flex flex-col justify-center pb-12">
        <!-- Login Form Section -->
        <div class="space-y-10">
            <div class="text-center space-y-3">
                <h2 class="text-[28px] font-bold tracking-tight text-on-surface">Welcome Back</h2>
                <p class="text-on-surface-variant text-base font-medium">Please enter your details to continue.</p>
            </div>
            
            <form class="space-y-6" onsubmit="event.preventDefault();">
                <!-- Inputs Container -->
                <div class="space-y-5">
                    <div class="relative group">
                        <input class="w-full h-16 px-6 bg-surface-container-high border-none rounded-2xl text-on-surface text-lg placeholder:text-on-surface-variant/60 focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="Username" type="text" required/>
                    </div>
                    <div class="relative group">
                        <input id="passwordInput" class="w-full h-16 px-6 bg-surface-container-high border-none rounded-2xl text-on-surface text-lg placeholder:text-on-surface-variant/60 focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="Password" type="password" required/>
                        <button id="togglePassword" class="absolute right-5 top-1/2 -translate-y-1/2 text-on-surface-variant/70 hover:text-primary transition-colors focus:outline-none" type="button">
                            <span class="material-symbols-outlined text-[24px]" id="visibilityIcon">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Options -->
                <div class="flex items-center justify-between px-1">
                    <label class="flex items-center space-x-3 cursor-pointer group">
                        <div class="relative flex items-center">
                            <input class="peer appearance-none w-6 h-6 border-2 border-outline-variant rounded-lg checked:bg-primary checked:border-primary transition-all cursor-pointer focus:ring-2 focus:ring-primary/20" type="checkbox"/>
                            <span class="material-symbols-outlined absolute text-white text-[18px] left-1/2 -translate-x-1/2 opacity-0 peer-checked:opacity-100 transition-opacity pointer-events-none">check</span>
                        </div>
                        <span class="text-base font-medium text-on-surface-variant group-hover:text-on-surface transition-colors">Remember Me</span>
                    </label>
                    <a class="text-base font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
                </div>

                <!-- Action Button -->
                <div class="pt-6">
                    <button type="submit" class="w-full h-16 luminous-cta text-on-primary font-bold rounded-full text-xl tracking-wider shadow-md hover:opacity-95 active:scale-[0.98] transition-all duration-200">
                        LOGIN
                    </button>
                </div>
            </form>

            <div class="pt-10 flex justify-center">
                <p class="text-base font-medium text-on-surface-variant">Don't have an account? 
                    <a class="text-primary font-bold hover:underline decoration-2 underline-offset-4" href="#">Register here</a>
                </p>
            </div>
        </div>
    </main>

    <!-- Footer Section -->
    <footer class="pb-8">
        <p class="text-xs text-on-surface-variant/50 font-medium">© 2026 VocabMaster. All rights reserved.</p>
    </footer>

    <script>
        // Simple Password Toggle Logic
        const passwordInput = document.getElementById('passwordInput');
        const togglePassword = document.getElementById('togglePassword');
        const visibilityIcon = document.getElementById('visibilityIcon');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            visibilityIcon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });
    </script>
</body>
</html>
